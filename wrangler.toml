workers_dev = true
name = "formsend-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "formsend-db"
database_id = "ff4587a3-c1f5-4dde-8b01-53f09f5e5fa6"

[[kv_namespaces]]
binding = "SESSIONS"
id = "e43ad599fe9d4e7b9b925f3ea1c8fe7a"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[vars]
FRONTEND_URL = "https://formsend.ezeroandone.io"
API_URL = "https://api.formsend.ezeroandone.io"

# Secrets are set via: wrangler secret put SECRET_NAME
# Required secrets: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, RESEND_API_KEY,
#                   FROM_EMAIL, PAYSTACK_SECRET_KEY, ADMIN_GOOGLE_EMAIL
# Custom domain (api.formsend.ezeroandone.io) is configured in the Cloudflare dashboard
# under Workers & Pages → formsend-api → Settings → Triggers → Custom Domains
